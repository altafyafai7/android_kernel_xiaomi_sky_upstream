name: Build Kernel (KSU-Next + SUSFS)

on:
  workflow_dispatch:
  push:
    branches:
      - ksunext-susfs-lto

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip libncurses-dev libssl-dev libtinfo5 libncurses5
          
      - name: Fetch Toolchains
        run: |
          mkdir -p toolchains
          # Fetch Clang 12 from Google
          mkdir -p toolchains/clang
          curl -LSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b1.tar.gz" -o clang.tar.gz
          tar -C toolchains/clang -xzf clang.tar.gz
          rm clang.tar.gz
          
          # Use LineageOS mirrors for GCC
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchains/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchains/gcc32

      - name: Fetch KSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          if ! grep -q "kernelsu" drivers/Kconfig; then
            sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-y += kernelsu/' >> drivers/Makefile
          fi

      - name: Fetch SUSFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          SUSFS_PATCH_DIR=$(find susfs4ksu/ -name "5.10" -type d | head -n 1)
          if [ -d "$SUSFS_PATCH_DIR" ]; then
            cp -r "$SUSFS_PATCH_DIR"/* .
          fi
          [ -f fs/susfs.patch ] && patch -p1 < fs/susfs.patch || echo "fs/susfs.patch not found"
          [ -f include/linux/susfs.patch ] && patch -p1 < include/linux/susfs.patch || echo "include/linux/susfs.patch not found"
          find susfs4ksu/ -name "susfs.c" -exec cp {} fs/ \; || echo "susfs.c not found"
          find susfs4ksu/ -name "susfs.h" -exec cp {} include/linux/ \; || echo "susfs.h not found"

      - name: Configure Kernel (Full LTO)
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/gcc64/bin:$(pwd)/toolchains/gcc32/bin:$PATH
          
          # Initialize with sky_GKI.config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 vendor/sky_GKI.config
          
          scripts/config --file out/.config --enable CONFIG_KSU
          scripts/config --file out/.config --enable CONFIG_KSU_NEXT
          scripts/config --file out/.config --enable CONFIG_SUSFS
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          
          # Enable Full LTO
          scripts/config --file out/.config --disable CONFIG_LTO_NONE
          scripts/config --file out/.config --enable CONFIG_LTO_CLANG_FULL
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/gcc64/bin:$(pwd)/toolchains/gcc32/bin:$PATH
          # Build Image.gz and dtbs (standard targets)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 Image.gz dtbs

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/dts/**/*.dtb
            out/arch/arm64/boot/dts/**/*.dtbo
