name: Build Kernel (KSU-Next + SUSFS)

on:
  workflow_dispatch:
  push:
    branches:
      - oss-upstream

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip
          pip3 install git-repo

      - name: Fetch Toolchain (Clang 12)
        run: |
          mkdir -p toolchains/clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b1.tar.gz
          tar -C toolchains/clang -xzf clang-r416183b1.tar.gz
          rm clang-r416183b1.tar.gz

      - name: Fetch KSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU-Next/main/kernel/setup.sh" | bash -s main

      - name: Fetch SUSFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cp -r susfs4ksu/kernel_patches/5.10/* . 
          find . -name "*.patch" -exec patch -p1 < {} \; || true

      - name: Configure Kernel (Full LTO)
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$PATH
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # Initialize with your specific sky_GKI.config
          make O=out ARCH=arm64 vendor/sky_GKI.config
          
          # Enable KSU-Next and SUSFS
          scripts/config --file out/.config --enable CONFIG_KSU
          scripts/config --file out/.config --enable CONFIG_KSU_NEXT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          
          # Enable Full LTO
          scripts/config --file out/.config --disable CONFIG_LTO_NONE
          scripts/config --file out/.config --enable CONFIG_LTO_CLANG_FULL
          
          make O=out ARCH=arm64 olddefconfig

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$PATH
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image.gz dtbo.img

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/dtbo.img
            out/arch/arm64/boot/dts/vendor/xiaomi/*.dtb
